<!DOCTYPE html>

<style>

body{
margin:0;
background:#121212;
color:white;
font-family:Arial;
}

.header{
padding:20px;
font-weight:bold;
font-size:22px;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:12px;
}

.card{
background:#1f1f1f;
border-radius:14px;
padding:14px;
text-align:center;
font-size:14px;
}

.female{
border:3px solid #ff4fa3;
}

.male{
border:3px solid #3aa0ff;
}

.bi{
border:3px solid #a855f7;
}
