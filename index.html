<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MatchNow</title>

<style>

:root{
--bg:#121212;
--panel:#1e1e1e;
--red:#ff2d2d;
--pink:#ff4fa3;
--blue:#3aa0ff;
--purple:#a855f7;
--text:#fff;
--muted:#bdbdbd;
}

body{
margin:0;
background:var(--bg);
color:var(--text);
font-family:Arial;
}

.header{
padding:20px;
font-size:26px;
font-weight:bold;
}

.sub{
color:var(--muted);
font-size:13px;
padding:0 20px 10px;
}

.chips{
display:flex;
gap:8px;
padding:10px 20px;
}

.chip{
background:#262626;
border:none;
color:white;
padding:10px 14px;
border-radius:20px;
cursor:pointer;
}

.chip.active{
background:var(--red);
}

.banner{
margin:12px 20px;
padding:14px;
background:#2a1717;
border-radius:12px;
}

.button{
background:var(--red);
padding:8px 14px;
border-radius:10px;
display:inline-block;
margin-top:10px;
cursor:pointer;
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:8px;
padding:12px;
}

.card{
background:var(--panel);
border-radius:14px;
overflow:hidden;
border:3px solid transparent;
cursor:pointer;
}

.female{border-color:var(--pink)}
.male{border-color:var(--blue)}
.bi{border-color:var(--purple)}

.photo{
height:90px;
background:linear-gradient(135deg,#3a3a3a,#222);
display:flex;
justify-content:space-between;
padding:6px;
font-size:11px;
}

.pill{
background:var(--red);
padding:3px 6px;
border-radius:999px;
}

.distance{
background:#0008;
padding:3px 6px;
border-radius:999px;
}

.meta{
padding:10px;
text-align:center;
}

.name{
font-weight:bold;
}

.bio{
font-size:11px;
color:#ccc;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#1a1a1a;
display:grid;
grid-template-columns:repeat(4,1fr);
padding:10px;
}

.nav button{
background:none;
border:none;
color:white;
font-size:14px;
}

.modal{
position:fixed;
inset:0;
background:#0009;
display:none;
align-items:flex-end;
}

.modal.show{
display:flex;
}

.sheet{
background:#181818;
width:100%;
padding:20px;
border-radius:20px 20px 0 0;
}

</style>
</head>

<body>

<div class="header">MATCHNOW</div>
<div class="sub">Beta · Barcelona</div>

<div class="chips">
<button class="chip active" onclick="setTabFilter(this,'ahora')">Ahora</button>
<button class="chip" onclick="setTabFilter(this,'esta_noche')">Esta noche</button>
<button class="chip" onclick="setTabFilter(this,'explorar')">Explorar</button>
</div>

<div class="banner">
🔥 Plan ahora<br>
<div class="button">Activar</div>
</div>

<div class="grid"></div>

<div class="nav">
<button onclick="showScreen('home')">Inicio</button>
<button onclick="showScreen('chats')">Chats</button>
<button onclick="showScreen('boost')">Boost</button>
<button onclick="showScreen('profile')">Perfil</button>
</div>

<div class="modal" id="modal" onclick="closeModal(event)">
<div class="sheet">
<h2 id="mName"></h2>
<p id="mBio"></p>
<button onclick="hideModal()">Cerrar</button>
</div>
</div>

<script>

const currentUser={
gender:"male",
interestedIn:["female"],
availableNow:true
}

const profiles=[
{
id:"p1",
name:"Laura, 26",
gender:"female",
interestedIn:["male"],
distanceKm:0.3,
lastActiveMinutes:3,
availableNow:true,
intent:"esta_noche",
bio:"Salir por el Born",
label:"🍸 Esta noche",
cardClass:"female"
},
{
id:"p2",
name:"Alex, 28",
gender:"male",
interestedIn:["female"],
distanceKm:0.5,
lastActiveMinutes:12,
availableNow:true,
intent:"plan_ahora",
bio:"Plan improvisado",
label:"🔥 Plan ahora",
cardClass:"male"
},
{
id:"p3",
name:"Clara, 27",
gender:"female",
interestedIn:["male"],
distanceKm:0.7,
lastActiveMinutes:20,
availableNow:false,
intent:"hablar",
bio:"Conocer gente",
label:"💬 Hablar",
cardClass:"female"
},
{
id:"p4",
name:"Sam, 29",
gender:"female",
interestedIn:["male","female"],
distanceKm:1,
lastActiveMinutes:8,
availableNow:false,
intent:"conocer",
bio:"Abierto a planes",
label:"✨ Conocer",
cardClass:"bi"
},
{
id:"p5",
name:"Eric, 30",
gender:"male",
interestedIn:["female"],
distanceKm:1.3,
lastActiveMinutes:4,
availableNow:false,
intent:"fiesta",
bio:"Salir esta noche",
label:"🎉 Fiesta",
cardClass:"male"
},
{
id:"p6",
name:"Ana, 24",
gender:"female",
interestedIn:["male"],
distanceKm:0.9,
lastActiveMinutes:6,
availableNow:false,
intent:"hablar",
bio:"Centro BCN",
label:"👀 Interés",
cardClass:"female"
}
]

function compatibilityScore(profile){
if(!currentUser.interestedIn.includes(profile.gender))return-1
if(!profile.interestedIn.includes(currentUser.gender))return-1
return 40
}

function distanceScore(d){
if(d<=0.3)return 25
if(d<=1)return 20
if(d<=3)return 15
if(d<=5)return 10
return 5
}

function activityScore(m){
if(m<=5)return 20
if(m<=10)return 15
if(m<=60)return 10
return 5
}

function availableNowScore(profile){
if(profile.availableNow&&currentUser.availableNow)return 40
if(profile.availableNow)return 30
return 0
}

function intentScore(intent,tab){

const table={
ahora:{plan_ahora:20,esta_noche:12,fiesta:10,hablar:6,conocer:4},
esta_noche:{esta_noche:20,fiesta:16,plan_ahora:14,hablar:5,conocer:6},
explorar:{plan_ahora:10,esta_noche:10,fiesta:9,hablar:8,conocer:8}
}

return table[tab][intent]||0
}

function calculateScore(profile,tab){

let compat=compatibilityScore(profile)
if(compat<0)return-1

let score=0

score+=compat
score+=distanceScore(profile.distanceKm)
score+=activityScore(profile.lastActiveMinutes)
score+=availableNowScore(profile)
score+=intentScore(profile.intent,tab)

return score
}

function rankProfiles(tab){

return profiles
.map(p=>({...p,score:calculateScore(p,tab)}))
.filter(p=>p.score>=0)
.sort((a,b)=>b.score-a.score)

}

function renderGrid(tab){

const grid=document.querySelector(".grid")

const ranked=rankProfiles(tab)

grid.innerHTML=ranked.map(p=>`
<div class="card ${p.cardClass}" onclick="openProfile('${p.name}','${p.bio}')">

<div class="photo">
<div class="pill">${p.label}</div>
<div class="distance">${p.distanceKm} km</div>
</div>

<div class="meta">
<div class="name">${p.name}</div>
<div class="bio">${p.bio}</div>
</div>

</div>
`).join("")

}

function setTabFilter(button,tab){

document.querySelectorAll(".chip").forEach(c=>c.classList.remove("active"))
button.classList.add("active")

renderGrid(tab)

}

function openProfile(name,bio){

document.getElementById("mName").innerText=name
document.getElementById("mBio").innerText=bio

document.getElementById("modal").classList.add("show")

}

function hideModal(){
document.getElementById("modal").classList.remove("show")
}

function closeModal(e){
if(e.target.id==="modal")hideModal()
}

renderGrid("ahora")

</script>

</body>
</html>
